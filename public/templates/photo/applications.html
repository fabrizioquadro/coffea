<style type="text/css">
html { 
	margin:0;
	padding:0;
	font-size: 12px;
	color: ##PAGECOLOR##;
	background: url('##PHOTONAME##') no-repeat center fixed; 
	-webkit-background-size: cover;
	background-size: cover;
	font-family: Verdana;
	height: 100%;
	width: 100%;
}
.applications-main {
	max-width: 820px;
	margin: 20px auto;
}
.applications-main img {
	max-width: 200px;
}
.applications {
	text-align: center;
	margin: 5px auto;
	padding: 20px;
	display: inline-block;
	background: rgb(##THEMECOLORRGB##);
	background: rgba(##THEMECOLORRGB##,0.7);
	-webkit-border-radius: 5px;
	-moz-border-radius: 5px;
	border-radius: 5px;
}
.applications img {
	width: 32px;
	height: 32px;
	border: none;
}
.app {
	width: 100px;
	height: 100px;
	background: rgb(255,255,255);
	background: rgba(255,255,255,0.4);
	border: 1px solid rgb(255,255,255);
	border: 1px solid rgba(255,255,255,0.5);
	display: inline-block;
	margin: 5px;
	-webkit-border-radius: 3px;
	-moz-border-radius: 3px;
	border-radius: 3px;
	overflow: hidden;
	line-height: 12px;
	font-size: 12px;
}
.app img { margin-bottom: 5px; }
.app a {
	display: table-cell;
	width: 100px;
	height: 100px;
	vertical-align: middle;
	color: ##PAGECOLOR##;
	text-decoration: none;
}
.app a:hover { text-decoration: none; }
a {
	color: ##PAGECOLOR##;
	text-decoration: none;
}
a:hover { text-decoration: underline; }
.logoff {
	float: right;
	background: rgb(##THEMECOLORRGB##);
	background: rgba(##THEMECOLORRGB##,0.7);
	color: ##PAGECOLOR##;
	padding: 12px;
	line-height: 0;
	font-size: 13px;
	font-family: 'Exo', sans-serif;
	-webkit-border-radius: 5px;
	-moz-border-radius: 5px;
	border-radius: 5px;
}
.applications h1 {
	margin-top: -5px;
	font-size: 20px;
	font-family: 'Exo', sans-serif;
	font-weight: normal;
}
</style>
